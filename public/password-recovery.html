<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Recovery - Multi-Company Sync</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #33cc66 0%, #333366 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .recovery-container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 450px;
        }

        h1 {
            color: #33cc66;
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #33cc66;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: #33cc66;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn:hover {
            background: #5568d3;
        }

        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .alert {
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
        }

        .alert.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .alert.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .links {
            text-align: center;
            margin-top: 20px;
        }

        .links a {
            color: #33cc66;
            text-decoration: none;
            font-size: 14px;
        }

        .links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="recovery-container">
        <h1>🔐 Password Recovery</h1>
        <p class="subtitle" id="subtitle">Enter your email to receive a 6-digit reset code</p>

        <div id="alert" class="alert"></div>

        <!-- Step 1: Request Code -->
        <form id="recoveryForm">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required>
            </div>

            <button type="submit" class="btn" id="submitBtn">Send Reset Code</button>
        </form>

        <!-- Step 2: Enter Code and New Password (hidden initially) -->
        <form id="resetForm" style="display: none;">
            <div class="form-group">
                <label for="code">6-Digit Reset Code</label>
                <input type="text" id="code" name="code" maxlength="6" pattern="[0-9]{6}" required placeholder="000000">
            </div>

            <div class="form-group">
                <label for="newPassword">New Password</label>
                <input type="password" id="newPassword" name="newPassword" minlength="6" required>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" name="confirmPassword" minlength="6" required>
            </div>

            <button type="submit" class="btn" id="resetBtn">Reset Password</button>
            <button type="button" class="btn" id="backBtn" style="background: #6b7280; margin-top: 10px;">Request New Code</button>
        </form>

        <div class="links">
            <a href="login.html">← Back to Login</a>
        </div>
    </div>

    <script>
        const isLocal = window.location.hostname === 'localhost' && window.location.pathname.includes('multi-company-Dev2Qbo');
        const API_BASE = isLocal ? '/multi-company-Dev2Qbo/public' : '';
        const PAGE_BASE = isLocal ? '/multi-company-Dev2Qbo/public' : '';

        function showAlert(message, type = 'info') {
            const alert = document.getElementById('alert');
            alert.textContent = message;
            alert.className = `alert ${type}`;
            alert.style.display = 'block';
        }

        // Step 1: Request reset code
        document.getElementById('recoveryForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const submitBtn = document.getElementById('submitBtn');
            const email = document.getElementById('email').value;

            if (!email) {
                showAlert('Please enter your email address', 'error');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'Sending...';

            try {
                const response = await fetch(`${API_BASE}/api/auth/password-recovery`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email })
                });

                const result = await response.json();

                if (response.ok) {
                    showAlert('✅ A 6-digit reset code has been sent to your email. Please check your inbox.', 'success');
                    
                    // Switch to step 2
                    document.getElementById('recoveryForm').style.display = 'none';
                    document.getElementById('resetForm').style.display = 'block';
                    document.getElementById('subtitle').textContent = 'Enter the code and your new password';
                } else {
                    showAlert('An error occurred. Please try again.', 'error');
                }
            } catch (error) {
                showAlert('An error occurred. Please try again.', 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Send Reset Code';
            }
        });

        // Step 2: Verify code and reset password
        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const code = document.getElementById('code').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            // Client-side validation
            if (code.length !== 6 || !/^\d{6}$/.test(code)) {
                showAlert('Please enter a valid 6-digit code', 'error');
                return;
            }

            if (newPassword.length < 6) {
                showAlert('Password must be at least 6 characters long', 'error');
                return;
            }

            if (newPassword !== confirmPassword) {
                showAlert('Passwords do not match', 'error');
                return;
            }

            const resetBtn = document.getElementById('resetBtn');
            resetBtn.disabled = true;
            resetBtn.textContent = 'Resetting...';

            try {
                const response = await fetch(`${API_BASE}/api/auth/reset-password`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email, code, password: newPassword })
                });

                const result = await response.json();

                if (response.ok) {
                    showAlert('✅ Password reset successfully! Redirecting to login...', 'success');
                    
                    // Redirect to login after 2 seconds
                    setTimeout(() => {
                        window.location.href = `${PAGE_BASE}/login.html`;
                    }, 2000);
                } else {
                    showAlert(result.error || 'Failed to reset password. Code may be invalid or expired.', 'error');
                    resetBtn.disabled = false;
                    resetBtn.textContent = 'Reset Password';
                }
            } catch (error) {
                showAlert('An error occurred. Please try again.', 'error');
                resetBtn.disabled = false;
                resetBtn.textContent = 'Reset Password';
            }
        });

        // Back button to request new code
        document.getElementById('backBtn').addEventListener('click', () => {
            document.getElementById('recoveryForm').style.display = 'block';
            document.getElementById('resetForm').style.display = 'none';
            document.getElementById('resetForm').reset();
            document.getElementById('subtitle').textContent = 'Enter your email to receive a 6-digit reset code';
            document.getElementById('alert').style.display = 'none';
        });
    </script>
</body>
</html>
